<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Explorador de Países - Busca información turística de naciones del mundo"
    />
    <title>Country Explorer - Explorador de Países</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <div id="app" class="container mx-auto px-4 py-8">
      <header class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">
          Explorador de Paises
        </h1>
        <p class="text-slate-400 text-lg mb-8">
          Descubre información turística de cualquier nación del mundo
        </p>

        <div class="max-w-4xl mx-auto">
          <div class="flex flex-col md:flex-row gap-4 mb-4">
            <input
              type="text"
              id="searchInput"
              placeholder="Buscar país (ej: España, México, Argentina...)"
              class="flex-1 px-6 py-4 rounded-xl bg-slate-700 text-white placeholder-slate-400 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            />
            
            <select
              id="regionFilter"
              class="px-6 py-4 rounded-xl bg-slate-700 text-white border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer appearance-none md:w-48"
            >
              <option value="">Todas las regiones</option>
              <option value="Africa">África</option>
              <option value="Americas">Américas</option>
              <option value="Asia">Asia</option>
              <option value="Europe">Europa</option>
              <option value="Oceania">Oceanía</option>
            </select>

            <button
              id="searchButton"
              class="px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-900"
            >
              Buscar
            </button>
          </div>

          <div class="flex flex-col sm:flex-row items-center justify-between bg-slate-800/50 p-4 rounded-xl border border-slate-700">
            <label class="flex items-center gap-3 text-slate-300 cursor-pointer mb-3 sm:mb-0">
              <div class="relative flex items-center">
                <input type="checkbox" id="favoritesToggle" class="sr-only peer" />
                <div class="w-11 h-6 bg-slate-600 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-blue-500 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
              </div>
              <span class="font-medium">Mostrar solo favoritos</span>
            </label>

            <button
              id="clearFavoritesBtn"
              class="px-4 py-2 text-sm text-red-400 border border-red-500/30 hover:bg-red-500/10 rounded-lg transition-colors flex items-center gap-2"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
              Limpiar favoritos
            </button>
          </div>
        </div>
      </header>

      <main>
        <div id="loadingState" class="hidden text-center py-12">
          <div class="animate-spin rounded-full h-16 w-16 border-4 border-blue-500 border-t-transparent mx-auto"></div>
          <p class="text-slate-400 mt-4">Buscando países...</p>
        </div>

        <div id="errorState" class="hidden max-w-md mx-auto bg-red-900/50 border border-red-500 rounded-xl p-6 text-center">
          <p class="text-red-400" id="errorMessage">Error al buscar países</p>
          <button id="retryButton" class="mt-4 px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors">
            Reintentar
          </button>
        </div>

        <div id="emptyState" class="hidden text-center py-12">
          <p class="text-slate-400 text-xl">
            🔍 Escribe el nombre de un país para comenzar o filtra por región
          </p>
        </div>

        <div id="noResultsState" class="hidden text-center py-12">
          <p class="text-slate-400 text-xl" id="noResultsMessage">
            😕 No se encontraron países
          </p>
        </div>

        <section id="countriesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          </section>

        <div id="countryModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div id="modalContent" class="bg-slate-800 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            </div>
        </div>
      </main>

      <footer class="mt-16 text-center text-slate-500 text-sm">
        <p>
          Datos proporcionados por
          <a href="https://restcountries.com" target="_blank" rel="noopener noreferrer" class="text-blue-400 hover:underline">
            REST Countries API
          </a>
        </p>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
